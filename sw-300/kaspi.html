<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Переход в Kaspi…</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #F14635; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif; }
    .wrap { min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 24px; text-align: center; }
    .card { max-width: 360px; }
    h1 { font-size: 22px; margin: 0 0 8px; font-weight: 700; }
    p { margin: 0 0 16px; opacity: .92; line-height: 1.5; }
    a.btn { display: inline-block; padding: 12px 22px; background: #fff; color: #F14635;
      border-radius: 12px; font-weight: 700; text-decoration: none; }
    .spinner { width: 36px; height: 36px; margin: 0 auto 18px; border: 3px solid rgba(255,255,255,.35);
      border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="spinner"></div>
    <h1>Открываем Kaspi…</h1>
    <p>Если приложение не открылось автоматически — нажмите кнопку ниже.</p>
    <a class="btn" id="fallback" href="https://kaspi.kz/shop/p/swanero-sw-300-fioletovyi-131178911/">Перейти на Kaspi.kz</a>
  </div>
</div>
<script>
  var kaspiWeb  = "https://kaspi.kz/shop/p/swanero-sw-300-fioletovyi-131178911/";
  var kaspiPath = "/shop/p/swanero-sw-300-fioletovyi-131178911/";

  var ua = navigator.userAgent || "";
  var isAndroid = /android/i.test(ua);
  var isIOS = /iphone|ipad|ipod/i.test(ua);

  if (isAndroid) {
    // Android: открываем карточку именно в приложении Kaspi через intent://, fallback — браузер.
    window.location.href =
      "intent://kaspi.kz" + kaspiPath +
      "#Intent;scheme=https;package=kz.kaspi.mobile;" +
      "S.browser_fallback_url=" + encodeURIComponent(kaspiWeb) + ";end";
  } else if (isIOS) {
    // iOS: у Kaspi настроены Universal Links — переход на https://kaspi.kz/... сам откроет приложение,
    // если оно установлено; иначе откроется веб-карточка.
    window.location.href = kaspiWeb;
  } else {
    window.location.href = kaspiWeb;
  }
</script>
</body>
</html>
